<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Трекер времени</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:    #F3F2ED;
  --white: #FFFFFF;
  --s2:    #ECEAE4;
  --blue:  #1A5CFF;
  --lime:  #C4FF3A;
  --ink:   #0C0C0C;
  --muted: #8A8880;
  --bord:  #DDD9CF;
  --r:     22px;
  --green: #22C55E;
  --red:   #EF4444;
}
html { font-size: 20px; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

/* ══ HERO ══ */
.hero {
  background: var(--white);
  border-bottom: 2px solid var(--bord);
  padding: 2.2rem 3rem 2rem;
  display: flex; flex-direction: column; gap: 1.2rem;
}
.hero-topbar {
  display: flex; align-items: center; justify-content: space-between;
}
.hero-date-group { display: flex; align-items: center; gap: 0.7rem; }
.hero-weekday {
  font-size: 0.75rem; font-weight: 900;
  letter-spacing: .14em; text-transform: uppercase; color: var(--blue);
}
.hero-fulldate {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; color: var(--muted); font-weight: 500;
}
.nav-btn {
  width: 2rem; height: 2rem;
  border: 1.5px solid var(--bord); border-radius: 8px;
  background: var(--bg); font-size: 1rem; cursor: pointer;
  color: var(--muted); display: flex; align-items: center; justify-content: center; transition: .12s;
}
.nav-btn:hover { border-color: var(--blue); color: var(--blue); }
.btn-today {
  font-size: 0.6rem; font-weight: 900; letter-spacing: .1em; text-transform: uppercase;
  padding: 0.35rem 0.75rem; background: var(--lime); border: none;
  border-radius: 8px; font-family: 'Inter', sans-serif; cursor: pointer; transition: .12s;
}
.btn-today:hover { background: #aef020; }

/* right side buttons */
.hero-right { display: flex; align-items: center; gap: 0.6rem; }

/* sync status */
.sync-status {
  display: flex; align-items: center; gap: 0.4rem;
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: .05em; padding: 0.4rem 0.8rem;
  border-radius: 8px; border: 1.5px solid var(--bord);
  background: var(--bg); color: var(--muted);
  transition: all .3s; white-space: nowrap;
}
.sync-status .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted); transition: background .3s;
}
.sync-status.syncing { border-color: var(--blue); color: var(--blue); }
.sync-status.syncing .dot { background: var(--blue); animation: pulse 1s infinite; }
.sync-status.ok { border-color: var(--green); color: var(--green); }
.sync-status.ok .dot { background: var(--green); }
.sync-status.error { border-color: var(--red); color: var(--red); }
.sync-status.error .dot { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.btn-export {
  display: flex; align-items: center; gap: 0.4rem;
  background: var(--ink); color: #fff; border: none;
  border-radius: 10px; padding: 0.55rem 1.1rem;
  font-family: 'Inter', sans-serif; font-size: 0.65rem;
  font-weight: 700; cursor: pointer; transition: .14s;
  letter-spacing: .02em; white-space: nowrap;
}
.btn-export:hover { background: var(--blue); transform: translateY(-1px); }

/* BIG TOTAL */
.hero-total-row { display: flex; align-items: baseline; gap: 0.5rem; line-height: 1; }
.hero-big {
  font-family: 'JetBrains Mono', monospace;
  font-size: 5.5rem; font-weight: 700;
  letter-spacing: -.04em; color: var(--blue);
}
.hero-big-label {
  font-size: 0.75rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em;
  align-self: flex-end; padding-bottom: 0.9rem;
}
.hero-subs { display: flex; gap: 2.5rem; }
.hero-sub-label {
  font-size: 0.55rem; font-weight: 800;
  letter-spacing: .13em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 0.2rem;
}
.hero-sub-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.4rem; font-weight: 600; letter-spacing: -.04em;
}
.hero-bar {
  height: 8px; background: var(--s2);
  border-radius: 4px; overflow: hidden; display: flex;
}
.hero-bar-seg { height: 100%; transition: width .4s ease; }

/* ══ CONTENT ══ */
.content { padding: 1.8rem 3rem 3rem; }

/* ══ ENTRY CARDS ══ */
.entry-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1rem; margin-bottom: 1rem;
}
.entry-card {
  background: var(--white); border: 2px solid var(--bord);
  border-radius: var(--r); overflow: hidden; cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
}
.entry-card:hover { border-color: var(--cc, var(--blue)); box-shadow: 0 4px 24px rgba(0,0,0,.06); }
.entry-card.active { border-color: var(--cc); box-shadow: 0 0 0 4px color-mix(in srgb, var(--cc) 15%, transparent); cursor: default; }
.entry-card.has-value { border-color: var(--cc); }

.card-head {
  display: flex; align-items: center;
  padding: 1.3rem 1.5rem; gap: 1rem; user-select: none;
}
.card-icon {
  width: 3rem; height: 3rem; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; background: var(--s2); flex-shrink: 0; transition: background .2s;
}
.entry-card.has-value .card-icon,
.entry-card.active .card-icon { background: color-mix(in srgb, var(--cc) 16%, white); }
.card-meta { flex: 1; min-width: 0; }
.card-cat-label {
  font-size: 0.56rem; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem;
}
.card-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.2rem; font-weight: 700; letter-spacing: -.06em;
  color: var(--ink); transition: color .15s; line-height: 1;
}
.card-val.zero { color: #CCCAC0; }
.entry-card.has-value .card-val { color: var(--cc); }
.card-toggle {
  width: 1.8rem; height: 1.8rem; border-radius: 8px;
  border: 1.5px solid var(--bord); background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; color: var(--muted); flex-shrink: 0; transition: .15s;
}
.entry-card:hover .card-toggle { border-color: var(--cc); color: var(--cc); }
.entry-card.active .card-toggle { background: var(--cc); border-color: var(--cc); color: #fff; transform: rotate(180deg); }

/* sync flash on card */
.entry-card.synced::after {
  content: '✓ сохранено';
  position: absolute; top: 0.6rem; right: 0.8rem;
  font-size: 0.5rem; font-weight: 800; letter-spacing: .08em;
  text-transform: uppercase; color: var(--green);
  animation: fadeOut 2.5s forwards;
}
@keyframes fadeOut { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

/* ── INLINE PICKER ── */
.card-picker {
  display: none; padding: 0 1.5rem 1.5rem;
  border-top: 1.5px solid var(--bord);
  animation: pkIn .16s ease;
}
@keyframes pkIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.entry-card.active .card-picker { display: block; }

.pk-presets {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem; padding-top: 1rem; margin-bottom: 1rem;
}
.pk-pre {
  padding: 0.75rem 0; border: 1.5px solid var(--bord); border-radius: 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; background: var(--bg); color: var(--ink); text-align: center; transition: .1s;
}
.pk-pre:hover { border-color: var(--cc); background: color-mix(in srgb, var(--cc) 8%, white); color: var(--cc); }
.pk-pre.sel { border-color: var(--cc); background: var(--cc); color: #fff; }

.pk-drums { display: flex; align-items: center; justify-content: center; gap: 0.6rem; margin-bottom: 1rem; }
.pk-drum { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
.pk-drum > label {
  font-size: 0.5rem; font-weight: 800; letter-spacing: .13em;
  text-transform: uppercase; color: var(--muted);
}
.pk-dbtn {
  width: 3.5rem; height: 1.8rem; border: none; background: var(--s2);
  border-radius: 8px; font-size: 0.7rem; font-weight: 800;
  cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center; transition: .1s;
}
.pk-dbtn:hover { background: var(--bord); color: var(--ink); }
.pk-dval {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.4rem; font-weight: 700; letter-spacing: -.06em;
  width: 4rem; text-align: center;
  border: 2px solid var(--bord); border-radius: 12px;
  padding: 0.3rem 0; background: var(--white); color: var(--ink);
  outline: none; cursor: text;
}
.pk-dval:focus { border-color: var(--cc); }
.pk-sep { font-size: 2rem; font-weight: 800; color: var(--bord); margin-top: 1.8rem; }

.pk-actions { display: flex; gap: 0.5rem; }
.pk-clear {
  flex: 1; padding: 0.7rem; border: 1.5px solid var(--bord); border-radius: 10px;
  background: var(--bg); font-family: 'Inter', sans-serif;
  font-size: 0.75rem; font-weight: 700; cursor: pointer; color: var(--muted); transition: .1s;
}
.pk-clear:hover { color: var(--ink); border-color: #aaa; }
.pk-save {
  flex: 2.5; padding: 0.7rem; border: none; border-radius: 10px;
  background: var(--cc); font-family: 'Inter', sans-serif;
  font-size: 0.75rem; font-weight: 800; cursor: pointer; color: #fff; transition: .14s;
}
.pk-save:hover { filter: brightness(1.08); transform: translateY(-1px); }

/* ══ CHARTS ══ */
.charts-row { display: grid; grid-template-columns: 1fr 1.8fr; gap: 1rem; margin-bottom: 1rem; }
.chart-card {
  background: var(--white); border: 2px solid var(--bord);
  border-radius: var(--r); padding: 1.5rem 1.6rem;
}
.chart-card h3 {
  font-size: 0.55rem; font-weight: 800;
  letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.1rem;
}

/* ══ HISTORY ══ */
.hist-card { background: var(--white); border: 2px solid var(--bord); border-radius: var(--r); overflow: hidden; }
.hist-top { padding: 1rem 1.5rem; border-bottom: 1.5px solid var(--bord); }
.hist-top h3 { font-size: 0.55rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }

table { width: 100%; border-collapse: collapse; }
th {
  padding: 0.65rem 1rem; font-size: 0.5rem; font-weight: 800;
  letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
  text-align: left; background: var(--s2); border-bottom: 1.5px solid var(--bord);
}
td { padding: 0.7rem 1rem; border-bottom: 1px solid var(--bord); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }
.td-date { font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600; }
.td-total { font-weight: 700; color: var(--blue); }
.td-zero { color: #CCC9BF; }

.empty { padding: 3.5rem 1.5rem; text-align: center; }
.empty .ei { font-size: 2.5rem; margin-bottom: 0.7rem; }
.empty p { color: var(--muted); font-size: 0.75rem; }
</style>
</head>
<body>

<!-- ═══ HERO ═══ -->
<div class="hero">
  <div class="hero-topbar">
    <div class="hero-date-group">
      <span class="hero-weekday" id="lblWD"></span>
      <span class="hero-fulldate" id="lblDate"></span>
      <button class="nav-btn" onclick="chDate(-1)">‹</button>
      <button class="nav-btn" onclick="chDate(1)">›</button>
      <button class="btn-today" onclick="goToday()">Сегодня</button>
    </div>
    <div class="hero-right">
      <div class="sync-status" id="syncStatus">
        <div class="dot"></div>
        <span id="syncText">Google Sheets</span>
      </div>
      <button class="btn-export" onclick="doExport()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M8 1v9m0 0L5 7m3 3 3-3M2 12v1.5A1.5 1.5 0 003.5 15h9a1.5 1.5 0 001.5-1.5V12"
            stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Скачать Excel
      </button>
    </div>
  </div>

  <div class="hero-total-row">
    <div class="hero-big" id="heroTotal">0:00</div>
    <div class="hero-big-label">часов сегодня</div>
  </div>

  <div class="hero-subs">
    <div>
      <div class="hero-sub-label">Рабочее</div>
      <div class="hero-sub-val" id="heroWork">0:00</div>
    </div>
    <div>
      <div class="hero-sub-label">Личное</div>
      <div class="hero-sub-val" id="heroPersonal">0:00</div>
    </div>
  </div>

  <div class="hero-bar" id="heroBar"></div>
</div>

<!-- ═══ CONTENT ═══ -->
<div class="content">
  <div class="entry-grid" id="entryGrid"></div>

  <div class="charts-row">
    <div class="chart-card"><h3>Сегодня</h3><canvas id="cPie"></canvas></div>
    <div class="chart-card"><h3>Последние 7 дней</h3><canvas id="cBar"></canvas></div>
  </div>

  <div class="hist-card">
    <div class="hist-top"><h3>История</h3></div>
    <div id="histWrap"></div>
  </div>
</div>

<script>
/* ── CONFIG ── */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxnd2ZyN7B6YzVvIH6wp8Uer5tNqG7OFV20Av7xmCqUrEHH3rREj6AfjDwRBsW_hahAPg/exec';

const CATS = [
  {key:'klim',  label:'Климат',             icon:'🌍', color:'#00B4A0', work:false},
  {key:'inv',   label:'Инвестиции',          icon:'📈', color:'#6C47FF', work:true },
  {key:'money', label:'Управление деньгами', icon:'💰', color:'#FF8C00', work:true },
  {key:'nav',   label:'Наставник',           icon:'🧭', color:'#1A5CFF', work:true },
  {key:'eff',   label:'Эффективность',       icon:'⚡', color:'#8DC900', work:true },
  {key:'edu',   label:'Обучение',            icon:'📚', color:'#E0366A', work:false},
];
const PRESETS = [0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4];
const SK = 'tt_v4';

let curDate = new Date(); curDate.setHours(0,0,0,0);
let openKey = null, pH = 0, pM = 0;
let chartPie = null, chartBar = null;
const WD = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];

/* ── STORAGE ── */
function load()  { try { return JSON.parse(localStorage.getItem(SK)) || {}; } catch { return {}; } }
function save(d) { localStorage.setItem(SK, JSON.stringify(d)); }
function dk(d)   { return d.toISOString().slice(0, 10); }
function fmt(m)  { if (!m) return '0:00'; return `${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`; }
function dayData() { return load()[dk(curDate)] || {}; }

function setVal(key, mins) {
  const d = load(), k = dk(curDate);
  if (!d[k]) d[k] = {};
  if (mins === 0) delete d[k][key]; else d[k][key] = mins;
  if (!Object.keys(d[k]).length) delete d[k];
  save(d);
}

/* ── GOOGLE SHEETS SYNC ── */
function setSyncStatus(state, text) {
  const el = document.getElementById('syncStatus');
  const tx = document.getElementById('syncText');
  el.className = 'sync-status ' + state;
  tx.textContent = text;
}

async function syncToSheets(dateKey) {
  const all = load();
  const values = all[dateKey] || {};
  
  setSyncStatus('syncing', 'Синхронизация...');
  
  try {
    // Google Apps Script требует no-cors для POST через fetch
    // Используем XMLHttpRequest через iframe trick или no-cors
    const payload = JSON.stringify({ date: dateKey, values });
    
    const resp = await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors', // GAS не поддерживает CORS для внешних доменов
      headers: { 'Content-Type': 'application/json' },
      body: payload
    });

    // no-cors всегда возвращает opaque response — считаем успехом
    setSyncStatus('ok', '✓ Синхронизировано');
    setTimeout(() => setSyncStatus('', 'Google Sheets'), 3000);
  } catch (err) {
    setSyncStatus('error', '✗ Ошибка синхронизации');
    console.error('Sync error:', err);
    setTimeout(() => setSyncStatus('', 'Google Sheets'), 4000);
  }
}

/* ── DATE ── */
function updateDateLabels() {
  document.getElementById('lblWD').textContent   = WD[curDate.getDay()];
  document.getElementById('lblDate').textContent = curDate.toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
}
function chDate(delta) { curDate = new Date(curDate); curDate.setDate(curDate.getDate() + delta); openKey = null; updateDateLabels(); renderAll(); }
function goToday()     { curDate = new Date(); curDate.setHours(0,0,0,0); openKey = null; updateDateLabels(); renderAll(); }

/* ── HERO ── */
function renderHero() {
  const day = dayData(); let tot = 0, work = 0, personal = 0;
  CATS.forEach(c => { const v = day[c.key]||0; tot += v; if (c.work) work += v; else personal += v; });
  document.getElementById('heroTotal').textContent    = fmt(tot);
  document.getElementById('heroWork').textContent     = fmt(work);
  document.getElementById('heroPersonal').textContent = fmt(personal);
  const bar = document.getElementById('heroBar'); bar.innerHTML = '';
  if (tot > 0) CATS.forEach(c => {
    const v = day[c.key]||0; if (!v) return;
    const s = document.createElement('div'); s.className = 'hero-bar-seg';
    s.style.width = ((v/tot)*100)+'%'; s.style.background = c.color;
    bar.appendChild(s);
  });
}

/* ── GRID ── */
function renderGrid() {
  const grid = document.getElementById('entryGrid');
  const day  = dayData();
  grid.innerHTML = '';

  CATS.forEach(cat => {
    const v      = day[cat.key] || 0;
    const isOpen = openKey === cat.key;

    const card = document.createElement('div');
    card.className = 'entry-card' + (v ? ' has-value' : '') + (isOpen ? ' active' : '');
    card.style.setProperty('--cc', cat.color);

    const presHtml = PRESETS.map(h => {
      const m   = h * 60;
      const sel = isOpen && m === (pH*60 + pM);
      return `<button class="pk-pre${sel?' sel':''}" onclick="presetPick(event,'${cat.key}',${m})">${fmt(m)}</button>`;
    }).join('');

    card.innerHTML = `
      <div class="card-head" onclick="toggleCard('${cat.key}',${v})">
        <div class="card-icon">${cat.icon}</div>
        <div class="card-meta">
          <div class="card-cat-label">${cat.label}</div>
          <div class="card-val${v?'':' zero'}">${fmt(v)}</div>
        </div>
        <div class="card-toggle">▾</div>
      </div>
      <div class="card-picker">
        <div class="pk-presets">${presHtml}</div>
        <div class="pk-drums">
          <div class="pk-drum">
            <label>Часы</label>
            <button class="pk-dbtn" onclick="adj(event,'${cat.key}','h',1)">▲</button>
            <div class="pk-dval" id="dh_${cat.key}" contenteditable="true"
              oninput="drumIn(event,'${cat.key}','h',this)">${isOpen ? pH : Math.floor(v/60)}</div>
            <button class="pk-dbtn" onclick="adj(event,'${cat.key}','h',-1)">▼</button>
          </div>
          <div class="pk-sep">:</div>
          <div class="pk-drum">
            <label>Минуты</label>
            <button class="pk-dbtn" onclick="adj(event,'${cat.key}','m',15)">▲</button>
            <div class="pk-dval" id="dm_${cat.key}" contenteditable="true"
              oninput="drumIn(event,'${cat.key}','m',this)">${isOpen ? String(pM).padStart(2,'0') : String(v%60).padStart(2,'0')}</div>
            <button class="pk-dbtn" onclick="adj(event,'${cat.key}','m',-15)">▼</button>
          </div>
        </div>
        <div class="pk-actions">
          <button class="pk-clear" onclick="clearCard(event,'${cat.key}')">Сбросить</button>
          <button class="pk-save"  onclick="saveCard(event,'${cat.key}')">Сохранить</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function toggleCard(key, curVal) {
  openKey = (openKey === key) ? null : key;
  if (openKey) { const v = curVal||0; pH = Math.floor(v/60); pM = v%60; }
  renderGrid();
}

function presetPick(e, key, mins) {
  e.stopPropagation(); pH = Math.floor(mins/60); pM = mins%60;
  updDrum(key); updPresets(key);
}
function adj(e, key, part, delta) {
  e.stopPropagation();
  if (part==='h') pH = Math.max(0, Math.min(23, pH+delta));
  else            pM = ((pM+delta)+60)%60;
  updDrum(key); updPresets(key);
}
function drumIn(e, key, part, el) {
  e.stopPropagation();
  const v = parseInt(el.textContent.replace(/\D/g,''))||0;
  if (part==='h') pH = Math.max(0,Math.min(23,v));
  else            pM = Math.max(0,Math.min(59,v));
  updPresets(key);
}
function updDrum(key) {
  const dh = document.getElementById('dh_'+key);
  const dm = document.getElementById('dm_'+key);
  if (dh) dh.textContent = pH;
  if (dm) dm.textContent = String(pM).padStart(2,'0');
}
function updPresets(key) {
  const grid = document.getElementById('entryGrid');
  const card = [...grid.children].find(c => c.querySelector('#dh_'+key));
  if (!card) return;
  card.querySelectorAll('.pk-pre').forEach((btn, i) => {
    btn.classList.toggle('sel', PRESETS[i]*60 === (pH*60+pM));
  });
}
function clearCard(e, key) { e.stopPropagation(); pH=0; pM=0; updDrum(key); updPresets(key); }

function saveCard(e, key) {
  e.stopPropagation();
  setVal(key, pH*60+pM);
  openKey = null;
  renderAll();
  // Автосинхронизация с Google Sheets
  syncToSheets(dk(curDate));
}

/* ── PIE ── */
function renderPie() {
  const day = dayData(); const lb=[], dt=[], cl=[];
  CATS.forEach(c => { const v=day[c.key]||0; if(v){lb.push(c.label);dt.push(v);cl.push(c.color);} });
  const ctx = document.getElementById('cPie').getContext('2d');
  if (chartPie) chartPie.destroy();
  if (!dt.length) {
    ctx.clearRect(0,0,400,300);
    ctx.fillStyle='#bbb'; ctx.font='14px Inter'; ctx.textAlign='center';
    ctx.fillText('Нет данных', 200, 150); return;
  }
  chartPie = new Chart(ctx, {
    type: 'doughnut',
    data: { labels: lb, datasets: [{ data: dt, backgroundColor: cl, borderWidth: 0, hoverOffset: 10 }] },
    options: { cutout:'66%', plugins: {
      legend: { position:'bottom', labels: { font:{family:'Inter',size:13}, boxWidth:11, padding:12 } },
      tooltip: { callbacks: { label: c => ` ${fmt(c.raw)}` } }
    }}
  });
}

/* ── BAR ── */
function renderBar() {
  const days = [];
  for (let i=6; i>=0; i--) { const d=new Date(curDate); d.setDate(d.getDate()-i); days.push(d); }
  const labels  = days.map(d => d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'}));
  const allData = load();
  const datasets = CATS
    .map(c => ({
      label: c.label,
      data:  days.map(d => (allData[dk(d)]?.[c.key]||0)/60),
      backgroundColor: c.color+'CC', borderRadius:5, borderSkipped:false
    }))
    .filter(ds => ds.data.some(v=>v>0));
  const ctx = document.getElementById('cBar').getContext('2d');
  if (chartBar) chartBar.destroy();
  chartBar = new Chart(ctx, {
    type: 'bar', data: { labels, datasets },
    options: {
      responsive: true,
      scales: {
        x: { stacked:true, grid:{display:false}, ticks:{font:{family:'JetBrains Mono',size:12},color:'#aaa'} },
        y: { stacked:true, grid:{color:'#f0efe9'}, ticks:{font:{family:'JetBrains Mono',size:12},color:'#aaa',callback:v=>v+'ч'} }
      },
      plugins: {
        legend: { display:false },
        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${fmt(Math.round(c.raw*60))}` } }
      }
    }
  });
}

/* ── HISTORY ── */
function renderHistory() {
  const allData = load(), wrap = document.getElementById('histWrap');
  const keys = Object.keys(allData).sort().reverse().slice(0, 30);
  if (!keys.length) {
    wrap.innerHTML = `<div class="empty"><div class="ei">📋</div><p>Записей пока нет. Заполни первый день!</p></div>`;
    return;
  }
  let html = `<table><thead><tr><th>Дата</th>`;
  CATS.forEach(c => html += `<th>${c.label}</th>`);
  html += `<th>Итого</th></tr></thead><tbody>`;
  keys.forEach(k => {
    const d = allData[k]||{}; let tot = 0;
    CATS.forEach(c => tot += d[c.key]||0);
    const date = new Date(k+'T00:00:00');
    html += `<tr><td class="td-date">${date.toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'short'})}</td>`;
    CATS.forEach(c => { const v=d[c.key]||0; html+=`<td class="${v?'':'td-zero'}">${fmt(v)}</td>`; });
    html += `<td class="td-total">${fmt(tot)}</td></tr>`;
  });
  html += `</tbody></table>`;
  wrap.innerHTML = html;
}

function renderAll() { renderHero(); renderGrid(); renderPie(); renderBar(); renderHistory(); }

/* ── EXCEL ── */
function doExport() {
  const wb = XLSX.utils.book_new(), all = load();
  const keys = Object.keys(all).sort();

  const daily = [['Дата', ...CATS.map(c=>c.label), 'Итого (мин)', 'Итого']];
  keys.forEach(k => {
    const d=all[k]||{}; let tot=0;
    const row=[k]; CATS.forEach(c=>{const v=d[c.key]||0;row.push(v);tot+=v;});
    row.push(tot); row.push(fmt(tot)); daily.push(row);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(daily);
  ws1['!cols'] = [{wch:14}, ...CATS.map(()=>({wch:16})), {wch:14}, {wch:10}];
  XLSX.utils.book_append_sheet(wb, ws1, 'По дням');

  function wStart(s) { const d=new Date(s+'T00:00:00'),day=d.getDay()||7; d.setDate(d.getDate()-day+1); return dk(d); }
  const wmap = {};
  keys.forEach(k => {
    const ws = wStart(k); if (!wmap[ws]) wmap[ws]={};
    CATS.forEach(c => { wmap[ws][c.key]=(wmap[ws][c.key]||0)+(all[k]?.[c.key]||0); });
  });
  const weekly = [['Неделя (Пн)', ...CATS.map(c=>c.label), 'Итого']];
  Object.keys(wmap).sort().forEach(w => {
    let tot=0; const row=[w];
    CATS.forEach(c=>{const v=wmap[w][c.key]||0;row.push(fmt(v));tot+=v;});
    row.push(fmt(tot)); weekly.push(row);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(weekly);
  ws2['!cols'] = [{wch:14}, ...CATS.map(()=>({wch:18})), {wch:12}];
  XLSX.utils.book_append_sheet(wb, ws2, 'По неделям');

  XLSX.writeFile(wb, `Трекер_${dk(new Date())}.xlsx`);
}

/* ── INIT ── */
updateDateLabels();
renderAll();
</script>
